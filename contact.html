<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karan Seroy — Contact</title>
    <meta
      name="description"
      content="Contact Karan Seroy for ML engineering and data science opportunities."
    />

    <meta property="og:title" content="Karan Seroy — Contact" />
    <meta
      property="og:description"
      content="Email, GitHub, and LinkedIn contact details for Karan Seroy."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ks6573.github.io/contact.html" />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("portfolio-theme");
          const theme =
            storedTheme === "light" || storedTheme === "dark"
              ? storedTheme
              : matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (_error) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
